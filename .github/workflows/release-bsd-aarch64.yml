name: Release (BSD aarch64)

# aarch64 BSD builds run in emulated VMs and take far longer than every
# other target, so they live in their own workflow: the main Release
# workflow publishes without waiting on them, and each job here attaches
# its tarball to the already-published release when it finishes.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-bsd-aarch64:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Same toolchain notes as build-bsd in release.yml: alsa-lib +
          # pkgconf for cpal's ALSA backend, cmake for aws-lc-sys.
          - label: freebsd-aarch64
            os: freebsd
            os_version: "14.3"
            arch: arm64
            install_deps: sudo env ASSUME_ALWAYS_YES=YES pkg install -y rust alsa-lib pkgconf cmake
          - label: netbsd-aarch64
            os: netbsd
            os_version: "10.1"
            arch: arm64
            install_deps: sudo pkgin -y update && sudo pkgin -y install rust alsa-lib pkgconf cmake
          # - label: openbsd-aarch64
          #   os: openbsd
          #   os_version: "7.9"
          #   arch: arm64
          #   install_deps: sudo pkg_add rust cmake

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # On manual dispatch, build the tag's code rather than the branch
          # the workflow was dispatched from.
          ref: ${{ inputs.tag || github.ref }}

      - name: Start ${{ matrix.os }} ${{ matrix.arch }} VM
        uses: cross-platform-actions/action@v1.3.0
        with:
          operating_system: ${{ matrix.os }}
          version: ${{ matrix.os_version }}
          architecture: ${{ matrix.arch }}
          shell: bash
          memory: 8G
          cpu_count: 4

      - name: Build in VM
        shell: cpa.sh {0}
        run: |
          set -euo pipefail
          ${{ matrix.install_deps }}
          case "$(uname -s)" in
            NetBSD)
              # pkg-config crate looks for `pkg-config`; pkgsrc ships `pkgconf`.
              export PKG_CONFIG=/usr/pkg/bin/pkgconf
              # NetBSD's runtime linker doesn't search /usr/pkg/lib by
              # default, so embed an rpath for libasound.
              export RUSTFLAGS="-C link-arg=-Wl,-rpath,/usr/pkg/lib"
              ;;
            OpenBSD)
              # OpenBSD's default datasize ulimit is too low for rustc
              ulimit -d "$(ulimit -H -d)" 2>/dev/null || true
              ;;
          esac
          # Keep target/ outside the workspace so it isn't synced back
          export CARGO_TARGET_DIR="$HOME/build"
          cargo build --release --locked --bin fin
          mkdir -p dist
          cp "$CARGO_TARGET_DIR/release/fin" dist/fin

      - name: Package tarball
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.tag }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          name="fin-${version}-${{ matrix.label }}"
          mkdir -p dist/staging
          install -m 0755 dist/fin dist/staging/fin
          cp README.md LICENSE dist/staging/
          tar -C dist/staging -czf "dist/${name}.tar.gz" .
          (cd dist && shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256")
          ls -lh dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: dist/*.tar.gz*
          if-no-files-found: error

      - name: Attach to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.tag }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          # The main Release workflow publishes the release from the fast
          # builds; these emulated builds normally finish long after it
          # exists, but poll briefly in case this job wins the race.
          for i in $(seq 1 60); do
            if gh release view "$version" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              break
            fi
            echo "Release $version not published yet; waiting (attempt $i/60)"
            sleep 60
          done
          gh release upload "$version" dist/*.tar.gz* --clobber --repo "$GITHUB_REPOSITORY"
